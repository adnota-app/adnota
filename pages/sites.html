<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vellum — My Edited Sites</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sites.css">
</head>
<body>

  <!-- ─── Header ─── -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-monogram">V</div>
        <div class="brand-text">
          <div class="brand-name">Vellum</div>
          <div class="brand-sub">The Persistent Canvas</div>
        </div>
      </div>

      <div class="header-actions">
        <div class="search-wrap">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search-input" class="search-input" type="text" placeholder="Filter sites…" autocomplete="off" spellcheck="false">
          <button id="search-clear" class="search-clear" aria-label="Clear search" hidden>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <div class="sort-wrap">
          <label class="sort-label" for="sort-select">Sort</label>
          <select id="sort-select" class="sort-select">
            <option value="recent">Most Recent</option>
            <option value="alpha">A → Z</option>
            <option value="count">Most Edits</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Summary bar -->
    <div class="summary-bar">
      <div class="summary-stat">
        <span id="total-sites" class="summary-num">0</span>
        <span class="summary-lbl">Sites</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-stat">
        <span id="total-edits" class="summary-num">0</span>
        <span class="summary-lbl">Total Edits</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-stat">
        <span id="total-pages" class="summary-num">0</span>
        <span class="summary-lbl">Pages</span>
      </div>
    </div>
  </header>

  <!-- ─── Main Content ─── -->
  <main class="main">

    <!-- Loading state -->
    <div id="state-loading" class="state-screen">
      <div class="spinner"></div>
      <p class="state-text">Loading your canvas…</p>
    </div>

    <!-- Empty state -->
    <div id="state-empty" class="state-screen" hidden>
      <div class="empty-icon">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" opacity="0.3"/>
          <path d="M8 12h8M12 8v8"/>
        </svg>
      </div>
      <h2 class="empty-title">Nothing here yet</h2>
      <p class="empty-body">Start using the Eraser, Sticky Notes, Highlighter, or Marker tool on any webpage — it'll appear here automatically.</p>
    </div>

    <!-- No results (after filter) -->
    <div id="state-no-results" class="state-screen" hidden>
      <div class="empty-icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          <path d="M8 11h6" opacity="0.5"/>
        </svg>
      </div>
      <h2 class="empty-title">No matches</h2>
      <p class="empty-body">No edited sites match your search. Try a different keyword.</p>
    </div>

    <!-- Sites list -->
    <div id="sites-list" class="sites-list" hidden></div>

  </main>

  <!-- ─── Toast ─── -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="sites.js"></script>
</body>
</html>
