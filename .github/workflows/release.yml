name: Release

# Triggered by pushing a tag matching v* (e.g. v0.9.0, v1.0.0, v1.0.0-rc.1).
# Builds the extension zip and publishes a GitHub Release with the zip
# attached. Tags containing a `-` (semver pre-release) are flagged as
# pre-releases so they don't replace "Latest" on the repo page.

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Guard against tag/manifest skew — the Chrome Web Store rejects
      # mismatched versions on upload, so catch it here instead.
      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TAG_BASE="${TAG_VERSION%%-*}"      # strip -rc.1 / -beta suffix
          if [ "$MANIFEST_VERSION" != "$TAG_BASE" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (base: $TAG_BASE) does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi
          echo "Packaging Adnota $TAG_VERSION (manifest $MANIFEST_VERSION)"

      # Install esbuild and minify the extension into dist/. tools/build.sh
      # controls exactly which files land in dist/ (per-file minified JS +
      # CSS, plus manifest, icons, fonts, HTML, LICENSE), so the zip step
      # below no longer needs an explicit include-list to keep dev files
      # out — they're never in dist/ in the first place.
      - name: Install build deps
        run: npm ci

      - name: Build minified bundle
        run: npm run build

      # Zip dist/ contents at the zip root so manifest.json sits at the
      # top level (Chrome Web Store requires this — a wrapping directory
      # makes the upload fail). `cd dist && zip -r ../$ZIP_NAME .` does
      # exactly that; the * glob would skip dotfiles, but build.sh doesn't
      # produce any, so plain `.` is fine and simpler.
      - name: Build zip
        run: |
          ZIP_NAME="adnota-${GITHUB_REF_NAME}.zip"
          (cd dist && zip -r "../$ZIP_NAME" . -x "*.DS_Store")
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          ls -lh "$ZIP_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
